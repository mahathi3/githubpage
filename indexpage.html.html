<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GitHub Login Clone</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            background: url("https://images.unsplash.com/photo-1555066931-4365d14bab8c") no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Dark overlay */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            top: 0;
            left: 0;
        }

        .container {
            position: relative;
            z-index: 1;
        }

        .login-box {
            background: #0d1117;
            padding: 40px;
            border-radius: 10px;
            width: 320px;
            color: #c9d1d9;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .logo {
            text-align: center;
            font-size: 40px;
            margin-bottom: 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 14px;
            margin-bottom: 5px;
        }

        input {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background: #010409;
            color: #fff;
        }

        input:focus {
            outline: none;
            border-color: #58a6ff;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #238636;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #2ea043;
        }

        .extra {
            margin-top: 15px;
            text-align: center;
        }

        .extra a {
            color: #58a6ff;
            text-decoration: none;
            font-size: 14px;
        }

        .extra a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="login-box">

            <div class="logo">
                <i class="fa-brands fa-github"></i>
            </div>

            <h2>Sign in to GitHub</h2>

            <form>
                <label>Username or email address</label>
                <input type="text" required>

                <label>Password</label>
                <input type="password" required>

                <button type="submit">Sign in</button>
            </form>

            <div class="extra">
                <a href="#">Forgot password?</a>
            </div>

        </div>
    </div>

</body>
</html>
